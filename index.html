<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校生活真实环境查询</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        h1 { text-align: center; color: #1a73e8; }
        input { padding: 12px; width: 70%; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; }
        button { padding: 12px 24px; font-size: 16px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #1662c7; }
        #result { margin: 30px 0; padding: 25px; background: #f8f9fa; border-radius: 12px; border-left: 5px solid #1a73e8; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .error { color: #d93025; }
    </style>
</head>
<body>
    <h1>🏫 高校生活真实环境查询</h1>
    
    <div style="text-align:center; margin:20px 0;">
        <input type="text" id="searchInput" placeholder="输入学校名称，例如 西安理工大学" />
        <button onclick="searchSchool()">🔍 查询</button>
    </div>

    <div id="result"></div>

    <h2>🙋‍♂️ 发现信息不准？帮忙补充数据</h2>
    <form id="submitForm" style="text-align:center;">
        <input type="text" id="schoolName" placeholder="学校名称" style="width:60%;" required>
        <button type="submit">去填写详情 →</button>
    </form>

    <script>
        let schoolData = [];

        // 加载本地 CSV（推荐方式）
        async function loadData() {
            try {
                const response = await fetch('./data.csv');   // 注意：要和 index.html 同目录
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                
                schoolData = rows.map(row => {
                    // 简单 CSV 解析（支持逗号）
                    const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    return {
                        school: cols[0] || '',
                        dorm: cols[1] || '暂无数据',
                        canteen: cols[2] || '暂无数据',
                        other: cols[3] || ''
                    };
                }).filter(item => item.school);

                console.log(`成功加载 ${schoolData.length} 条数据`);
            } catch (e) {
                console.error(e);
                document.getElementById('result').innerHTML = `<p class="error">数据加载失败，请确认 data.csv 文件已上传</p>`;
            }
        }

        function searchSchool() {
            let keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;

            history.replaceState(null, '', `?s=${encodeURIComponent(keyword)}`);

            const results = schoolData.filter(item => 
                item.school.toLowerCase().includes(keyword.toLowerCase())
            );

            let html = `<h2>搜索「${keyword}」的结果</h2>`;

            if (results.length > 0) {
                results.forEach(item => {
                    html += `
                    <div class="card">
                        <h3>${item.school}</h3>
                        <p><strong>🏠 宿舍情况：</strong>${item.dorm}</p>
                        <p><strong>🍲 食堂情况：</strong>${item.canteen}</p>
                        ${item.other ? `<p><strong>📝 其他：</strong>${item.other}</p>` : ''}
                    </div>`;
                });
            } else {
                html += `<p>暂无「${keyword}」的数据，欢迎下方补充！</p>`;
            }

            document.getElementById('result').innerHTML = html;
        }

        // 投稿
        document.getElementById('submitForm').onsubmit = function(e) {
            e.preventDefault();
            const school = document.getElementById('schoolName').value.trim();
            if (!school) return;
            
            // 替换成你的真实表单链接
            const formUrl = "https://docs.google.com/forms/d/e/你的表单ID/viewform?usp=pp_url&entry.你的ID=" + encodeURIComponent(school);
            window.open(formUrl, '_blank');
        };

        window.onload = async () => {
            await loadData();
            const params = new URLSearchParams(window.location.search);
            const s = params.get('s');
            if (s) {
                document.getElementById('searchInput').value = s;
                searchSchool();
            }
        };
    </script>
</body>
</html>
